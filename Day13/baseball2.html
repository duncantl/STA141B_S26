# Compute the payroll for each time in each year

+ Salaries table

--

```sql
SELECT teamID,  SUM(salary) AS payroll, yearID, lgID
FROM Salaries
GROUP BY teamID, yearID;
```

---
# Add the full name of the team

--

```sql
SELECT S.teamID,  SUM(salary) AS payroll, S.yearID, S.lgID
FROM Salaries AS S, Teams AS T
WHERE T.teamId = S.teamId
GROUP BY S.teamID, S.yearID;
```

--
+ Is this correct?

+ No!

--
+ 2 issues
   + Ignores teams for which we have no salary information.
      + Salary information starts in 1985.
```sql

FROM Salaries;

# Nested query

+ Explore the problem

+ LEFT JOIN

```sql
SELECT name, P.*
FROM (SELECT teamID,  SUM(salary) AS payroll, yearID, lgID
      FROM Salaries
      GROUP BY teamID, yearID
     ) AS P
LEFT JOIN Teams AS T
ON T.teamID = P.teamID;
```

+ How many rows in this?  

--
  + 69981!!

---

+ In R, let's look at the San Francisco Giants (SFN)
```r
d = sql(q)
subset(d, teamID == "SFN")
```
--

+  Lots of repeats for the same payroll.
   + How many?
   + Why?

---

# Problem

+ Consider the join of the nested query with Teams
  + 918 rows for the GROUP BY with payroll
    + 1 row per year and teamID

+ Join with Teams using `ON P.teamID = Teams.teamID`

+ Consider 3 rows from the payroll table
```
321    ANA 31135472   1997   AL
349    ANA 41281000   1998   AL
379    ANA 55388166   1999   AL
```

+ Match those in Teams
     + ANA 1997 will match rows in Teams with
          + ANA 1997
          + ANA 1998
          + ANA 1999 etc.
     + Same for ANA 1998

+ So we have repeat rows from the GROUP BY table from the JOIN with Teams

+ Need to make the JOIN more specific
   + teamID and yearID must be equal
   + avoid matching rows with different yearID

---
# Correct?

```sql
SELECT name, P.*
FROM (SELECT teamID,  SUM(salary) AS payroll, yearID, lgID
      FROM Salaries
      GROUP BY teamID, yearID
     ) AS P
LEFT JOIN Teams AS T
ON T.teamID = P.teamID
   AND
   T.yearID = P.yearID;
```

---
# Better?

```sql
SELECT name, S.teamID,  SUM(salary) AS payroll, S.yearID, S.lgID
FROM Salaries AS S, Teams AS T
WHERE T.teamId = S.teamId 
      AND 
      T.yearID = S.yearID
GROUP BY S.teamID, S.yearID;
```

# Which team won the world series in 2022

+ We want their full name, not just the abbreviation (e.g., SFN)

--

```sql
SELECT t.name, t.lgID, t.divID, t.W, t.L, s.losses
FROM SeriesPost AS s,
     Teams AS t
WHERE s.round = 'WS'
  AND s.teamIDwinner = t.teamID
  AND s.yearID = 2022
  AND t.yearID = 2022;
```

<!-- 5 -->
# Compute the winner and the loser of the world series for all years.
  
+ Include the team name, league, division, number of games won and lost during the season
   for both the winning and the losing team.

--

```sql
SELECT s.yearID, 
       w.name AS winningTeamName,
       w.lgID AS winningLeague, 
	   w.divID AS winningDivision,
	   w.teamID AS winningTeamID, 
	   w.W AS winningTeamWins, 
	   w.L AS winningTeamLoses,
       l.name AS winningTeamName,
       l.lgID AS winningLeague, 
	   l.divID AS winningDivision,
	   l.teamID AS winningTeamID, 
	   l.W AS winningTeamWins, 
	   l.L AS winningTeamLoses
FROM SeriesPost AS s,
     Teams AS w,
	 Teams AS l
WHERE
     s.round = 'WS'
AND  s.teamIDwinner = w.teamID
AND	 s.yearID = w.yearID
AND	 s.teamIDloser = l.teamID
AND	 s.yearID = l.yearID
ORDER BY s.yearID DESC
```
